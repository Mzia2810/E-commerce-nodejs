# azure-pipelines.yml
trigger:
  branches:
    include:
      - main   # or your default branch

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'  # Set Node.js version

steps:
# Step 1: Checkout code
- task: Checkout@1

# Step 2: Install Node.js
- task: UseNode@1
  inputs:
    version: $(NODE_VERSION)
    checkLatest: true

# Step 3: Install dependencies
- script: npm install
  displayName: 'Install npm dependencies'

# Step 4: Run tests (optional, if you have any)
- script: npm test
  displayName: 'Run tests'
  continueOnError: true  # Remove this if you want the pipeline to fail on test errors

# Step 5: Build project (optional, if you have a build step)
- script: npm run build
  displayName: 'Build project'
  condition: succeededOrFailed() # run even if tests fail

# Step 6: Publish artifacts (optional)
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'